<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Your Ticket</title>
  <style>
    body { 
      font-family: Verdana, sans-serif; 
      background: white; 
      color: #0bd3f1; 
      text-align: center; 
      padding: 20px; 
      
    }
    
    .ticket-wrapper { 
      display: inline-block; 
      background: #d0e1e39e; 
      padding: 20px; 
      border-radius: 10px; 
      
    }
    
    .ticket { 
      background: white; 
      color: #0bd3f1; 
      padding: 15px; 
      border-radius: 8px; 
      text-align: left; 
      margin-bottom: 20px; 
      
    }
    
    .qrcode { 
      margin: 20px auto;
    }
    
    button.download-btn { 
      margin-top: 20px; 
      padding: 10px 20px; 
      font-size: 16px; 
      font-weight: bold; 
      color: #0bd3f1; 
      background: #d0e1e39e; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      
    }
    
    button.download-btn:hover { 
      background: #a9dbe1f2;
      color: #0e5c67;
      
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  let booking;
  let bookingId;

  window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    bookingId = params.get("bookingId");   // bookingId comes from the URL
    booking = JSON.parse(localStorage.getItem(bookingId));

    if (!booking) {
      document.getElementById("ticketInfo").innerHTML = "<p>No ticket data found. Please book again.</p>";
      return;
    }

    const events = {
      show1: { title: "Sasolburg, Home", date: "28 March 2026, 12:00" },
      show2: { title: "Vaalpark, Home", date: "5 April 2026, 12:00" }
    };
    const event = events[booking.eventId];

    // Show ticket info
    document.getElementById("ticketInfo").innerHTML = `
      <div class="ticket">
        <h3>${event.title}</h3>
        <p><b>Date:</b> ${event.date}</p>
        <p><b>Name:</b> ${booking.surname}, ${booking.name}</p>
        <p><b>Seats Booked:</b> ${booking.tickets}</p>
      </div>
    `;

    const qrContainer = document.getElementById("qrcodes");
    for (let i = 1; i <= booking.tickets; i++) {
      const code = String(i).padStart(4, '0');
      const ticketInfo = `
Event: ${event.title}
Date: ${event.date}
Name: ${booking.name} ${booking.surname}
Cell: ${booking.cellno}
Age: ${booking.age}
Ticket Number: ${code}
Valid Until: ${event.date}
`;
      const div = document.createElement("div");
      div.classList.add("qrcode");
      qrContainer.appendChild(div);
      new QRCode(div, { text: ticketInfo, width: 180, height: 180 });
    }
  };

  // Download ticket (info + QR codes together)
  function downloadTicket() {
    html2canvas(document.getElementById("ticketWrapper")).then(canvas => {
      const link = document.createElement("a");
      // Use bookingId in the filename (e.g., ticket-TICKET4821.png)
      link.download = `ticket-${bookingId}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  }
</script>
</head>
<body>
  <h2>Your Ticket</h2>
  <p>Please use the button below to download your ticket.</p>
  
  <div id="ticketWrapper" class="ticket-wrapper">
    <div id="ticketInfo"></div>
    <div id="qrcodes"></div>
  </div>

  <button class="download-btn" onclick="downloadTicket()">Download Ticket</button>
</body>
</html>
